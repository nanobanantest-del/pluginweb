<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Plugin Compiler</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 800px;
        }
        h2 {
            text-align: center;
            color: #4CAF50;
            margin-bottom: 25px;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
            background-color: #383838;
            padding: 15px;
            border-radius: 8px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #4CAF50;
        }
        p.help-text {
            font-size: 13px;
            color: #aaaaaa;
            margin-top: 0;
            margin-bottom: 10px;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            background-color: #2d2d2d;
            border: 1px solid #555;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
        textarea {
            width: 100%;
            padding: 12px;
            background-color: #1e1e1e;
            border: 1px solid #555;
            border-radius: 5px;
            color: #e6e6e6;
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #4CAF50;
        }
        button {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>⚔️ Universal Plugin Compiler ⚔️</h2>
        
        <form action="/compile" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="java_files">1. Upload .java Files (Phase 1, 2, 3, 4 sabhi files yahan dalein):</label>
                <input type="file" id="java_files" name="java_files" accept=".java" multiple required>
            </div>

            <div class="form-group">
                <label for="plugin_yml">2. Upload plugin.yml:</label>
                <input type="file" id="plugin_yml" name="plugin_yml" accept=".yml,.yaml" required>
            </div>

            <div class="form-group">
                <label for="pom_extras">3. Custom Maven Dependencies (Optional):</label>
                <p class="help-text">Agar Citizens ya Vault jaisa koi bahari API use kar rahe ho, toh unka &lt;repository&gt; aur &lt;dependency&gt; code yahan paste karo.</p>
                <textarea id="pom_extras" name="pom_extras" rows="10" placeholder="<repositories>
    <repository>
        <id>citizens-repo</id>
        <url>https://maven.citizensnpcs.co/repo</url>
    </repository>
</repositories>

<dependencies>
    <dependency>
        <groupId>net.citizensnpcs</groupId>
        <artifactId>citizens-main</artifactId>
        <version>2.0.33-SNAPSHOT</version>
        <scope>provided</scope>
    </dependency>
</dependencies>"></textarea>
            </div>

            <button type="submit" onclick="this.innerHTML='Compiling... Please wait!';">Compile & Download JAR</button>
            
        </form>
    </div>

</body>
</html>
