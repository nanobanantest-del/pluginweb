<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Plugin Compiler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
        <h1 class="text-3xl font-bold text-green-400 mb-6 text-center">Cloud Compiler</h1>
        
        <form id="compileForm" action="/compile" method="POST" enctype="multipart/form-data" class="space-y-4">
            
            <div>
                <label class="block text-sm font-medium text-gray-300">Plugin Name</label>
                <input type="text" name="plugin_name" required placeholder="e.g. LifestealCore" class="mt-1 block w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:ring-green-500 focus:border-green-500 text-white outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300">Package Name</label>
                <input type="text" name="package_name" required placeholder="e.g. com.heppysmp.core" class="mt-1 block w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:ring-green-500 focus:border-green-500 text-white outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300">Paper API Version</label>
                <select name="api_version" class="mt-1 block w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:ring-green-500 focus:border-green-500 text-white outline-none">
                    <option value="1.20.4">1.20.4</option>
                    <option value="1.20.1">1.20.1</option>
                    <option value="1.19.4">1.19.4</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300">Upload .java Files</label>
                <input type="file" name="java_files" accept=".java" multiple required class="mt-1 block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-green-600 file:text-white hover:file:bg-green-700 cursor-pointer">
            </div>

            <button type="submit" class="w-full py-3 px-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg transition duration-200 mt-6 shadow-lg">
                Compile & Download .JAR
            </button>
        </form>
    </div>

    <div id="loadingScreen" class="fixed inset-0 bg-gray-900 bg-opacity-95 flex flex-col items-center justify-center hidden z-50">
        <svg class="animate-spin h-16 w-16 text-green-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <h2 class="text-2xl font-bold text-white">Compiling Source Code...</h2>
        <p class="text-gray-400 mt-2 text-center max-w-sm">Maven dependencies download ho rahi hain. Isme thoda waqt lag sakta hai, please wait.</p>
    </div>

    <script>
        document.getElementById('compileForm').addEventListener('submit', function() {
            document.getElementById('loadingScreen').classList.remove('hidden');
            
            // Jar file download trigger hone ke baad loading hatana
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('compileForm').reset();
            }, 8000); 
        });
    </script>
</body>
</html>
